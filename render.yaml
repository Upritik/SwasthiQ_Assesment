services:
  - type: web
    name: swasthia-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./pharmacy.db

  - type: web
    name: swasthia-frontend
    env: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: swasthia-backend
          property: host
        value: "https://${swasthia-backend.host}/api"